name: 조제일자 안내

on:
  schedule:
    - cron: '0 19 * * 0-4'  # KST 월~금 04:00 실행 → 슬랙이 05:55에 예약 발송
  workflow_dispatch:

jobs:
  send-joje:
    runs-on: ubuntu-latest
    steps:
      - name: 패키지 설치
        run: pip install requests pytz

      - name: 조제일자 슬랙 예약 전송
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_ILHO }}
        run: |
          python3 << 'EOF'
          import requests
          from datetime import datetime
          import pytz
          import os

          kst = pytz.timezone('Asia/Seoul')
          now = datetime.now(kst)

          year = now.strftime('%y')
          month = now.strftime('%m')
          day = now.strftime('%d')

          nums = [year[0], month[0], day[0], year[1], month[1], day[1]]
          joje = '  '.join(nums)

          message = f"\U0001f4c5 오늘 조제일자 안내\n───────────────\n　　*{joje}*"

          # 오늘 KST 05:55 타임스탬프 계산
          target = now.replace(hour=5, minute=55, second=0, microsecond=0)

          if now >= target:
              # 이미 05:55 지남 (극단적 지연) → 즉시 전송
              res = requests.post(
                  'https://slack.com/api/chat.postMessage',
                  headers={'Authorization': f'Bearer {os.environ["SLACK_BOT_TOKEN"]}'},
                  json={'channel': 'C08BTN82VFZ', 'text': message, 'mrkdwn': True}
              )
              label = '즉시 전송'
          else:
              # 슬랙이 정확히 05:55에 발송하도록 예약
              res = requests.post(
                  'https://slack.com/api/chat.scheduleMessage',
                  headers={'Authorization': f'Bearer {os.environ["SLACK_BOT_TOKEN"]}'},
                  json={'channel': 'C08BTN82VFZ', 'text': message, 'post_at': int(target.timestamp())}
              )
              label = f"05:55 예약"

          data = res.json()
          if data.get('ok'):
              print(f"✅ {label} 성공: {joje}")
          else:
              print(f"❌ 실패: {data.get('error')}")
              exit(1)
          EOF
